<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Employee Attendance System</title>


    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }


        body {
            min-height: 100vh;
            background: #f4f6f8;
            color: #1f2937;
        }


        /* Header */

        header {
            background: #16324F;
            color: white;
            padding: 25px 8%;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        .logo {
            font-size: 22px;
            font-weight: bold;
        }


        .header-text {
            font-size: 14px;
            opacity: 0.9;
        }


        /* Main */

        .main-container {
            width: 90%;
            max-width: 850px;

            margin: 70px auto;
        }


        .welcome {
            text-align: center;
            margin-bottom: 35px;
        }


        .welcome h1 {
            color: #16324F;
            font-size: 34px;
            margin-bottom: 12px;
        }


        .welcome p {
            color: #6b7280;
            font-size: 16px;
        }


        /* Attendance Card */

        .attendance-card {
            background: white;

            padding: 40px;

            border-radius: 12px;

            box-shadow:
                0 8px 30px
                rgba(0, 0, 0, 0.08);
        }


        .attendance-card h2 {
            color: #16324F;
            margin-bottom: 10px;
        }


        .description {
            color: #6b7280;
            margin-bottom: 30px;
        }


        /* Form */

        .attendance-form {

            display: flex;

            align-items: flex-end;

            gap: 18px;
        }


        .form-group {
            flex: 1;
        }


        .form-group label {

            display: block;

            margin-bottom: 8px;

            color: #374151;

            font-size: 14px;

            font-weight: bold;
        }


        .form-group input {

            width: 100%;

            height: 48px;

            padding: 0 14px;

            border: 1px solid #d1d5db;

            border-radius: 7px;

            font-size: 15px;

            outline: none;
        }


        .form-group input:focus {

            border-color: #16324F;

            box-shadow:
                0 0 0 3px
                rgba(22, 50, 79, 0.1);
        }


        /* Submit Button */

        .submit-btn {

            height: 48px;

            padding: 0 30px;

            border: none;

            border-radius: 7px;

            background: #16324F;

            color: white;

            font-size: 15px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }


        .submit-btn:hover {

            background: #244d73;

            transform: translateY(-1px);
        }


        /* Footer */

        footer {

            text-align: center;

            color: #9ca3af;

            padding: 25px;

            font-size: 13px;
        }


        /* Mobile */

        @media (max-width: 700px) {

            header {

                flex-direction: column;

                gap: 8px;

                text-align: center;
            }


            .welcome h1 {

                font-size: 27px;
            }


            .attendance-card {

                padding: 25px;
            }


            .attendance-form {

                flex-direction: column;

                align-items: stretch;
            }


            .submit-btn {

                width: 100%;
            }

        }

    </style>

</head>


<body>


<header>


    <div class="logo">

        Employee Attendance

    </div>


    <div class="header-text">

        Employee Entry Registration System

    </div>


</header>



<main class="main-container">


    <div class="welcome">


        <h1>

            Employee Attendance System

        </h1>


        <p>

            Please register your entry to the workplace

        </p>


    </div>



    <div class="attendance-card">


        <h2>

            Register Your Attendance

        </h2>


        <p class="description">

            Enter your name and the time you entered the workplace.

        </p>



        <!--
            IMPORTANT:
            The PHP file must be named attendance.php
            and must be in the same folder.
        -->

        <form

            class="attendance-form"

            action="attendance.php"

            method="POST"

        >


            <div class="form-group">


                <label for="employee_name">

                    Employee Name

                </label>


                <input

                    type="text"

                    id="employee_name"

                    name="employee_name"

                    placeholder="Enter your full name"

                    required

                >


            </div>



            <div class="form-group">


                <label for="entry_time">

                    Entry Time

                </label>


                <input

                    type="time"

                    id="entry_time"

                    name="entry_time"

                    required

                >


            </div>



            <button

                type="submit"

                class="submit-btn"

            >

                Submit Attendance

            </button>


        </form>


    </div>


</main>



<footer>

    Employee Attendance System © 2026

</footer>


</body>

</html>
